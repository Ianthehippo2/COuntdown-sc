<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Day Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
  font-family: 'Anton', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(to bottom, #89CFF0, #CEE2EB);
  background-attachment: fixed;
  color: #fff;
  text-align: center;
}
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    h1 {
  letter-spacing: 2px;
  text-transform: uppercase;
}
    #school-days {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
    }
    #counter {
  font-size: 3rem;
  font-weight: bold;
  color: #fff;
  margin: 20px 0;
  animation: fade-in 1s ease-in-out;

  /* BLUE BACKGROUND BOX */
  background: linear-gradient(135deg, #4FC3F7, #0288D1);
  padding: 15px 25px;
  border-radius: 12px;

  /* styling to match your site */
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
    p {
      font-size: 1.2rem;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      color: #8B0000;
      background: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, background-color 0.2s;
    }
    button:hover {
      background: #fff;
      color: #8B0000;
      transform: scale(1.05);
    }
    .watch-live {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: #ff0000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, background-color 0.3s;
    }
    .watch-live:hover {
      background: #cc0000;
      transform: scale(1.1);
    }
    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes moveCloud {
  from {
    transform: translateX(-200px);
  }
  to {
    transform: translateX(110vw);
  }
}
    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }
      #counter {
        font-size: 2.5rem;
      }
      p {
        font-size: 1rem;
      }
      button {
        font-size: 0.9rem;
        padding: 8px 16px;
      }
    }
    #main-logo {
  width: 360px;
  max-width: 85%;
  margin-bottom: 5px;
  filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
  animation: fade-in 1s ease-in-out;
}

@media (max-width: 768px) {
  #main-logo {
    width: 220px;
  }
}
#cloud-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.cloud {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  filter: blur(2px);
  animation: moveCloud linear infinite;
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}

.cloud.small { width: 60px; height: 30px; }
.cloud.medium { width: 120px; height: 60px; }
.cloud.large { width: 200px; height: 100px; }

.cloud.small::before { width: 30px; height: 30px; top: -10px; left: 10px; }
.cloud.small::after { width: 40px; height: 40px; top: -15px; right: 10px; }

.cloud.medium::before { width: 60px; height: 60px; top: -20px; left: 20px; }
.cloud.medium::after { width: 70px; height: 70px; top: -25px; right: 20px; }

.cloud.large::before { width: 100px; height: 100px; top: -30px; left: 40px; }
.cloud.large::after { width: 110px; height: 110px; top: -35px; right: 40px; }

#cloud-container {
  z-index: 0;
}

#coming-soon-cover {
  z-index: 9999999;
}

</style>
</head>
<body>
  <div id="cloud-container"></div>
  
  <img 
  src="https://raw.githubusercontent.com/Ianthehippo2/COuntdown-sc/refs/heads/main/KKC1.png" 
  id="main-logo"
/>
  <h1>Schooled Offical Countdown</h1>
  <div id="school-days">Loading school days...</div>
  <div id="counter">Loading...</div>
  <p>Counting Down to the Last Day of Schooled June 4</p>
  <button class="watch-live" onclick="watchLive()">WATCH LIVE</button>

  <script>
    const validSchoolDays = [
      "2026-04-30", "2026-05-01", "2026-05-04", "2026-05-05", "2026-05-06", "2026-05-07", "2026-05-12", "2026-05-13", "2026-05-14", "2026-05-15",
      "2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21",
      "2026-05-22", "2026-05-26", "2026-05-27", "2026-05-28",
      "2026-05-29", "2026-06-01", "2026-06-02", "2026-06-03", "2026-06-04"
    ];

    function countRemainingSchoolDays() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return validSchoolDays.filter(dateStr => new Date(dateStr) >= today).length;
    }

    function getLastSchoolDay() {
  const lastDay = new Date("2026-06-04T09:40:00");
  return lastDay;
}

    function updateCounter() {
      const remainingSchoolDays = countRemainingSchoolDays();
      document.getElementById("school-days").textContent = `${remainingSchoolDays} School Days Remaining`;

      const lastSchoolDay = getLastSchoolDay();
      const now = new Date();

      if (now > lastSchoolDay) {
        document.getElementById("counter").textContent = "ITS OVER!";
        return;
      }

      const diff = lastSchoolDay - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("counter").textContent =
        `${days} DAYS ${hours} HOURS ${minutes} MINUTES ${seconds} SECONDS`;

      setTimeout(updateCounter, 1000);
    }

    function watchLive() {
      alert("Redirecting to live stream...");
      window.location.href = "https://www.twitch.tv/kaicenat";
    }

    updateCounter();
  </script>
<div id="coming-soon-cover">
  <div class="coming-soon-box">
    <div class="badge">Get Ready for the Countdown</div>
    <h1>Coming Soon</h1>
    <p>Something is about to go Crazy! Come back soon.</p>
    <div id="countdown">Loading countdown...</div>
  </div>
</div>

<style>
  #coming-soon-cover {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 10, 0.75);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    padding: 20px;
  }

  .coming-soon-box {
    width: min(90%, 600px);
    text-align: center;
    color: white;
    font-family: 'Anton', Arial, sans-serif;
    padding: 40px 30px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
  }

  .badge {
    display: inline-block;
    margin-bottom: 16px;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.18);
  }

  .coming-soon-box h1 {
    margin: 0 0 12px;
    font-size: clamp(38px, 6vw, 64px);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .coming-soon-box p {
    margin: 0 0 24px;
    font-size: clamp(16px, 2vw, 20px);
    color: rgba(255, 255, 255, 0.9);
  }

  #countdown {
    display: inline-block;
    min-width: 260px;
    padding: 16px 22px;
    border-radius: 16px;
    font-size: clamp(18px, 2.6vw, 28px);
    font-weight: bold;
    letter-spacing: 1px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
</style>

<script>
  (function () {
    const removeDate = new Date("2026-05-04T09:40:00-04:00");
    const cover = document.getElementById("coming-soon-cover");
    const countdown = document.getElementById("countdown");

    function updateCountdown() {
      const now = new Date();
      const diff = removeDate.getTime() - now.getTime();

      if (diff <= 0) {
        if (cover) cover.remove();
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      countdown.textContent =
        days + "D " +
        hours.toString().padStart(2, "0") + "H " +
        minutes.toString().padStart(2, "0") + "M " +
        seconds.toString().padStart(2, "0") + "S";
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  })();
</script>
<div id="regular-days-card">
  <div class="regular-days-label">Regular School Days Left</div>
  <div id="regular-days-number">Loading...</div>
</div>
<img 
  src="https://raw.githubusercontent.com/Ianthehippo2/COuntdown-sc/refs/heads/main/SPO.png" 
  id="sponsor-logo"
/>
<style>
  #regular-days-card {
    margin: 10px 0 20px;
    padding: 18px 28px;
    border-radius: 18px;
    background: #89CFF0;
    border: 3px solid #fff;
    box-shadow: 0 10px 30px #fff;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    text-align: center;
    opacity: 0.75;
  }

  .regular-days-label {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 1;
    margin-bottom: 6px;
  }

  #regular-days-number {
    font-size: 2.4rem;
    font-weight: bold;
    color: #ffffff;
  }
#sponsor-logo {
  width: 500px;
  max-width: 90%;
  margin-top: 20px;

  display: block;
  margin-left: auto;
  margin-right: auto;

  filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
}
</style>

<script>
  (function () {
    const regularSchoolDays = [
      "2026-04-27",
      "2026-04-28",
      "2026-04-29",
      "2026-04-30",
      "2026-05-01",
      "2026-05-04",
      "2026-05-05",
      "2026-05-06",
      "2026-05-07",
      "2026-05-26",
      "2026-05-27",
      "2026-05-28",
      "2026-05-29"
    ];

    function updateRegularSchoolDays() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const remaining = regularSchoolDays.filter(dateStr => {
        const day = new Date(dateStr + "T00:00:00");
        return day >= today;
      }).length;

      document.getElementById("regular-days-number").textContent =
        remaining + " Days";
    }

    updateRegularSchoolDays();
    setInterval(updateRegularSchoolDays, 1000);
  })();
</script>
<script>
(function () {
  const container = document.getElementById("cloud-container");
  if (!container) return;

  const sizes = ["small", "medium", "large"];

  function createCloud() {
    const cloud = document.createElement("div");
    const size = sizes[Math.floor(Math.random() * sizes.length)];

    cloud.classList.add("cloud", size);

    cloud.style.top = Math.random() * 80 + "%";
    cloud.style.left = "-250px";
    cloud.style.animationDuration = (25 + Math.random() * 45) + "s";
    cloud.style.animationDelay = Math.random() * 20 + "s";
    cloud.style.opacity = 0.5 + Math.random() * 0.4;

    container.appendChild(cloud);
  }

  for (let i = 0; i < 20; i++) {
    createCloud();
  }
})();
</script>
</body>
</html>
